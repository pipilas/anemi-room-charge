name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Windows EXE ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller paramiko reportlab

      - name: Build EXE
        run: pyinstaller anemi_room_charge.spec --clean --noconfirm

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/AnemiRoomCharge.exe

  # ── Build macOS DMG ──────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller paramiko reportlab

      - name: Build APP
        run: pyinstaller anemi_room_charge.spec --clean --noconfirm

      - name: Get version
        id: version
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          APP_NAME="ANEMI Room Charge"
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="AnemiRoomCharge-${VERSION}-mac"

          mkdir -p dmg_temp
          cp -R "dist/${APP_NAME}.app" dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "${APP_NAME}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "dist/${DMG_NAME}.dmg"

          rm -rf dmg_temp

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/AnemiRoomCharge-*-mac.dmg

  # ── Create GitHub Release + Update version.json ─────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Get release notes from version.json
        id: notes
        run: |
          NOTES=$(python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          print(d.get('release_notes', 'New release'))
          ")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## ANEMI Room Charge v${{ steps.version.outputs.version }}

            ${{ steps.notes.outputs.notes }}

            ### Downloads
            - **Windows:** AnemiRoomCharge.exe
            - **macOS:** AnemiRoomCharge-${{ steps.version.outputs.version }}-mac.dmg
          files: |
            artifacts/AnemiRoomCharge.exe
            artifacts/AnemiRoomCharge-*-mac.dmg

      # ── Update version.json AFTER release is created ───────────────
      - name: Update version.json with correct URLs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          NOTES=$(python3 -c "
          import json
          with open('version.json') as f:
              d = json.load(f)
          print(d.get('release_notes', ''))
          ")

          python3 -c "
          import json
          version = '${VERSION}'
          with open('version.json') as f:
              d = json.load(f)
          d['latest_version'] = version
          d['download_url_windows'] = f'https://github.com/pipilas/anemi-room-charge/releases/download/v{version}/AnemiRoomCharge.exe'
          d['download_url_mac'] = f'https://github.com/pipilas/anemi-room-charge/releases/download/v{version}/AnemiRoomCharge-{version}-mac.dmg'
          d['release_date'] = '$(date -I)'
          with open('version.json', 'w') as f:
              json.dump(d, f, indent=2)
          "

      - name: Commit and push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || (git commit -m "Update version.json to v${{ steps.version.outputs.version }} [skip ci]" && git push origin main)
